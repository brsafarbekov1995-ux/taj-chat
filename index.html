<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJ CHAT - Пурра</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove, update, onChildRemoved, onChildChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        // Идентификатори истифодабаранда
        let myId = localStorage.getItem("chat_user_id") || "user_" + Math.floor(Math.random() * 1000000);
        localStorage.setItem("chat_user_id", myId);

        // Тағйирёбандаҳои ҷаҳонӣ
        let lastDate = "";
        let selectedMessages = [];
        let mediaRecorder;
        let audioChunks = [];
        let audioBlob = null;
        let timerInterval;
        let currentAudio = null; 
        let currentPlayingAudio = null; // Ин барои қатъ кардани аудиоҳои чат истифода мешавад

        // Элементҳои UI
        const inputArea = document.getElementById("message-input");
        const recordingUi = document.getElementById("recording-ui");
        const previewUi = document.getElementById("preview-ui");
        const micBtn = document.getElementById("mic-btn");
        const sendBtn = document.getElementById("send-btn");
        const stopBtn = document.getElementById("stop-btn");
        const recordTimer = document.getElementById("record-timer");
        const menu = document.getElementById("custom-menu");
        const trigger = document.getElementById("menu-trigger");

        // --- Логикаи воридкунии матн ---
        inputArea.addEventListener("input", () => {
            if (inputArea.value.trim() !== "") {
                micBtn.style.display = "none";
                sendBtn.style.display = "flex";
            } else {
                micBtn.style.display = "flex";
                sendBtn.style.display = "none";
            }
        });

      // --- Идоракунии Модалҳо ---
window.closeModal = (id) => {
    document.getElementById(id).style.display = "none";
};

// --- Логикаи Аудио ---
let isPlaying = false; 

// 1. Оғози сабти овоз
micBtn.onclick = async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        
        mediaRecorder.onstop = () => {
            audioBlob = new Blob(audioChunks, { type: 'audio/ogg; codecs=opus' });
            recordingUi.style.display = "none";
            previewUi.style.display = "flex"; 
            
            // Аниматсияро қатъ мекунем (нест мекунем)
            stopBtn.classList.remove("stop-pulsing");
        };

        mediaRecorder.start();
        
        // Намоиш додани UI-и сабт
        inputArea.style.display = "none"; 
        micBtn.style.display = "none";
        recordingUi.style.display = "flex";
        stopBtn.style.display = "flex";
        
        // Илова кардани аниматсияи сурхи мигаткунанда ба тугмаи Stop
        stopBtn.classList.add("stop-pulsing");

        let seconds = 0;
        timerInterval = setInterval(() => {
            seconds++;
            recordTimer.innerText = new Date(seconds * 1000).toISOString().substr(14, 5);
        }, 1000);
    } catch (err) { alert("Иҷозат барои микрофон лозим аст!"); }
};

// 2. Қатъи сабт
stopBtn.onclick = () => {
    mediaRecorder.stop();
    clearInterval(timerInterval);
    
    stopBtn.classList.remove("stop-pulsing");
    stopBtn.style.display = "none";
    sendBtn.style.display = "flex";
};

// 3. Плеери муттаҳидшуда (барои пешнамоиш)
window.toggleAudioPreview = () => {
    const btn = document.getElementById("toggle-play-btn");
    
    if (!currentAudio) {
        const url = URL.createObjectURL(audioBlob);
        currentAudio = new Audio(url);
        currentAudio.onended = () => {
            isPlaying = false;
            btn.innerText = "▶";
        };
    }

    if (isPlaying) {
        currentAudio.pause();
        btn.innerText = "▶";
    } else {
        currentAudio.play();
        btn.innerText = "■";
    }
    isPlaying = !isPlaying;
};

// 4. Бекор кардани аудио
window.cancelAudio = () => {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
    }
    isPlaying = false;
    document.getElementById("toggle-play-btn").innerText = "▶";
    
    audioBlob = null;
    previewUi.style.display = "none";
    inputArea.style.display = "block"; 
    micBtn.style.display = "flex";     
    sendBtn.style.display = "none";
};

// --- Ирсоли Паём ---
window.sendMessage = async () => {
    if (audioBlob) {
        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = () => {
            push(messagesRef, { 
                type: 'audio',
                audio: reader.result,
                duration: recordTimer.innerText,
                senderId: myId, 
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                date: new Date().toLocaleDateString()
            });
            cancelAudio();
        };
    } else if (inputArea.value.trim() !== "") {
        const now = new Date();
        push(messagesRef, { 
            text: inputArea.value, 
            senderId: myId, 
            time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            date: now.toLocaleDateString()
        });
        inputArea.value = "";
        sendBtn.style.display = "none";
        micBtn.style.display = "flex";
    }
};

// --- Функсияҳои Меню ва Идоракунӣ ---
window.toggleSelect = (msgKey, element) => {
    if (selectedMessages.includes(msgKey)) {
        selectedMessages = selectedMessages.filter(id => id !== msgKey);
        element.classList.remove('selected-message');
    } else {
        selectedMessages.push(msgKey);
        element.classList.add('selected-message');
    }
    trigger.style.visibility = selectedMessages.length > 0 ? "visible" : "hidden";
};

window.openMenuAtTop = (e) => { 
    e.stopPropagation(); 
    if (selectedMessages.length > 0) {
        const msgKey = selectedMessages[0];
        const msgElement = document.getElementById(msgKey);
        if (msgElement) {
            const type = msgElement.getAttribute("data-type");
            const copyBtn = document.getElementById("btn-copy");
            const editBtn = document.getElementById("btn-edit");
            if (copyBtn && editBtn) {
                if (type === 'audio') {
                    copyBtn.style.display = "none";
                    editBtn.style.display = "none";
                } else {
                    copyBtn.style.display = "block";
                    editBtn.style.display = "block";
                }
            }
        }
    }
    menu.classList.toggle('show'); 
};

document.addEventListener("click", (e) => { 
    if (!e.target.closest('#custom-menu') && !e.target.closest('#menu-trigger')) {
        menu.classList.remove('show'); 
    }
});

const finishSelection = () => {
    selectedMessages.forEach(id => document.getElementById(id)?.classList.remove('selected-message'));
    selectedMessages = [];
    trigger.style.visibility = "hidden";
    menu.classList.remove('show');
};

window.copyMessage = () => {
    if (selectedMessages.length > 0) {
        const text = document.getElementById(selectedMessages[0]).querySelector('.msg-text')?.innerText || "";
        navigator.clipboard.writeText(text);
    }
    finishSelection();
};

window.openEditModal = () => {
    if (selectedMessages.length > 0) {
        const msgKey = selectedMessages[0];
        const msgElement = document.getElementById(msgKey);
        if (msgElement.classList.contains('my-msg')) {
            const textElement = msgElement.querySelector('.msg-text');
            if(textElement) {
                document.getElementById("edit-input").value = textElement.innerText;
                document.getElementById("edit-modal").style.display = "flex";
            }
        }
    }
    menu.classList.remove('show');
};

window.saveEdit = () => {
    const newText = document.getElementById("edit-input").value;
    const msgKey = selectedMessages[0];
    if (newText && msgKey) { update(ref(db, 'messages/' + msgKey), { text: newText }); }
    closeModal('edit-modal');
    finishSelection(); 
};

window.showDeleteModal = () => { 
    document.getElementById("delete-modal").style.display = "flex"; 
    menu.classList.remove('show'); 
};

window.clearAllMessages = () => {
    remove(messagesRef);
    document.getElementById("chat-box").innerHTML = "";
    lastDate = ""; 
    finishSelection();
};

window.deleteSelected = (type) => {
    selectedMessages.forEach(msgKey => {
        if (type === 'me') {
            let hidden = JSON.parse(localStorage.getItem("hidden_msgs") || "[]");
            hidden.push(msgKey);
            localStorage.setItem("hidden_msgs", JSON.stringify(hidden));
            document.getElementById(msgKey)?.remove();
        } else remove(ref(db, 'messages/' + msgKey));
    });
    closeModal('delete-modal');
    finishSelection(); 
};

        // --- Рендери Паёмҳо ---
        onChildAdded(messagesRef, (data) => {
            let hidden = JSON.parse(localStorage.getItem("hidden_msgs") || "[]");
            if (hidden.includes(data.key)) return;
            
            const msg = data.val();
            const currentDate = msg.date || "Имрӯз";
            
            if (currentDate !== lastDate) {
                const dateDiv = document.createElement("div");
                dateDiv.className = "date-divider";
                dateDiv.innerText = currentDate;
                document.getElementById("chat-box").appendChild(dateDiv);
                lastDate = currentDate;
            }

            const div = document.createElement("div");
            div.id = data.key;
            div.setAttribute("data-type", msg.type === 'audio' ? 'audio' : 'text'); 
            div.className = `msg-bubble ${msg.senderId === myId ? 'my-msg' : 'rec-msg'}`;
            
            if(msg.type === 'audio') {
                const audioObj = new Audio(msg.audio);
                div.innerHTML = `<div style="display:flex; align-items:center; gap:8px;">
                                    <button id="play-${data.key}" style="background:#075e54; border:none; color:white; border-radius:50%; width:30px; height:30px;">▶</button>
                                    <button id="stop-${data.key}" style="background:orange; border:none; color:white; border-radius:50%; width:30px; height:30px; display:none;">■</button>
                                    <span>🎙️ ${msg.duration}</span>
                                </div><div class="msg-time">${msg.time}</div>`;
                
                const playBtn = div.querySelector(`#play-${data.key}`);
                const stopBtn = div.querySelector(`#stop-${data.key}`);
                
                playBtn.onclick = () => {
                    // Агар аудиои дигар садо дода истода бошад, онро қатъ мекунем
                    if (currentPlayingAudio) {
                        currentPlayingAudio.pause();
                        currentPlayingAudio.currentTime = 0;
                        document.querySelectorAll('button[id^="stop-"]').forEach(btn => btn.style.display = 'none');
                        document.querySelectorAll('button[id^="play-"]').forEach(btn => btn.style.display = 'block');
                    }
                    
                    audioObj.play();
                    currentPlayingAudio = audioObj; 
                    playBtn.style.display = "none";
                    stopBtn.style.display = "block";
                };
                
                stopBtn.onclick = () => {
                    audioObj.pause();
                    audioObj.currentTime = 0;
                    currentPlayingAudio = null;
                    stopBtn.style.display = "none";
                    playBtn.style.display = "block";
                };
                
                audioObj.onended = () => {
                    currentPlayingAudio = null;
                    stopBtn.style.display = "none";
                    playBtn.style.display = "block";
                };
            } else {
                div.innerHTML = `<div class="msg-text">${msg.text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>')}</div><div class="msg-time">${msg.time}</div>`;
            }
            
            div.onclick = () => window.toggleSelect(data.key, div);
            document.getElementById("chat-box").appendChild(div);
            document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
        });

        onChildRemoved(messagesRef, (data) => { const element = document.getElementById(data.key); if (element) element.remove(); });
        
        onChildChanged(messagesRef, (data) => {
            const msg = data.val();
            const element = document.getElementById(data.key);
            if (element && msg.text) { element.querySelector('.msg-text').innerHTML = msg.text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>'); }
        });

        // --- Санҷиши Интернет ---
        function updateOnlineStatus() {
            const indicator = document.getElementById("loading-indicator");
            const body = document.body;
            if (!navigator.onLine) {
                indicator.style.display = "flex"; 
                body.classList.add("offline-mode");
            } else {
                indicator.style.display = "none";
                body.classList.remove("offline-mode");
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();
</script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #e5ddd5; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: rgba(7, 94, 84, 0.85); backdrop-filter: blur(8px); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; position: sticky; top: 0; z-index: 1000; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .date-divider { align-self: center; background: #e1f3fb; color: #555; padding: 4px 12px; border-radius: 8px; font-size: 11px; margin: 10px 0; }
        .msg-bubble { position: relative; padding: 8px 10px 22px 10px; border-radius: 15px; max-width: 80%; width: fit-content; cursor: pointer; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .my-msg { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .rec-msg { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }
        .selected-message { background-color: #95c7f0 !important; }
        .msg-text { font-size: 15px; word-wrap: break-word; }
        .msg-time { position: absolute; bottom: 4px; right: 8px; font-size: 10px; color: #777; }
        #menu-trigger { cursor: pointer; font-size: 24px; }
        #custom-menu { position: absolute; right: 20px; top: 60px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 9999; width: 180px; padding: 5px 0; opacity: 0; visibility: hidden; transition: 0.2s; }
        #custom-menu.show { opacity: 1; visibility: visible; }
        #custom-menu button { display: block; width: 100%; padding: 10px 15px; border: none; background: none; text-align: left; cursor: pointer; }
        .modal-overlay { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        .btn-action { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #075e54; color: white; }
        .input-panel { padding: 10px; background: transparent; display: flex; gap: 8px; align-items: center; }
        textarea { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; height: 40px; resize: none; }
        .btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #075e54; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #recording-ui { display: none; flex: 1; align-items: center; justify-content: center; gap: 10px; }
        #preview-ui { display: none; flex: 1; align-items: center; justify-content: space-between; background: white; padding: 5px 15px; border-radius: 20px; }
        .wave { width: 3px; height: 15px; background: #075e54; animation: wave-anim 1s infinite; }
        @keyframes wave-anim { 0%, 100% { height: 10px; } 50% { height: 25px; } }
        .recording-blink { animation: blink 1s infinite; color: red; }
        @keyframes blink { 50% { opacity: 0; } }
        .offline-mode { pointer-events: none; opacity: 0.5; filter: grayscale(1); }
        #loading-indicator { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(3px); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #075e54; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
		/* Ин барои он аст, ки ҳангоми пинҳон шудани textarea, 
   recording-ui ё preview-ui пурра ҷойро гиранд */
#message-input {
    transition: display 0.3s;
}
/* Услуби асосии тугма */
#mic-btn {
    background: #ffffff;
    border: 2px solid #000000;
    transition: transform 0.2s;
}

/* Синфи аниматсияи сурх */
.stop-pulsing {
    animation: pulse-red 1s infinite;
}

/* Аниматсияи сурхи мигаткунанда */
@keyframes pulse-red {
    0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
    70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
}
#file-btn {
    background-color: #ffffff !important; /* Фони сафед */
    border: 2px solid #000000 !important; /* Рамкаи сиёҳ */
    width: 45px;
    height: 45px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 8px;
    flex-shrink: 0;
    padding: 0; /* Барои марказонии иконка */
}

/* Ин қисмро нест кунед ё шарҳ диҳед, то рангаш тағйир наёбад */
#file-btn:active {
    transform: scale(0.9);
    background-color: #ffffff !important; /* Ранги сафедро нигоҳ медорад */
}
    </style>
</head>
<body>
    <div id="loading-indicator">
        <div class="spinner"></div>
        <p>Интернет нест, интизор шавед...</p>
    </div>
    
<div id="custom-menu">
    <button id="btn-copy" onclick="copyMessage()">📋 Нусха кардан</button>
    <button id="btn-edit" onclick="openEditModal()">✏️ Таҳрир</button>
    <button onclick="showDeleteModal()">🗑️ Нест кардан</button>
    <button onclick="clearAllMessages()" style="color: red;">🧹 Пок кардани чат</button>
</div>
    
    <div id="delete-modal" class="modal-overlay" onclick="if(event.target==this) closeModal('delete-modal')">
        <div class="modal-content">
            <h3>Нест кардан:</h3>
            <button class="btn-action" onclick="deleteSelected('me')">👁️ Аз экрани ман</button>
            <button class="btn-action" onclick="deleteSelected('everyone')">🗑️ Аз ҳама</button>
        </div>
    </div>
    
    <div id="edit-modal" class="modal-overlay" onclick="if(event.target==this) closeModal('edit-modal')">
        <div class="modal-content">
            <textarea id="edit-input" style="width: 100%; height: 60px;"></textarea>
            <button class="btn-action" onclick="saveEdit()">Сабт кардан</button>
        </div>
    </div>
    
    <div class="header">
        <span></span> <div>TAJ CHAT</div> <span id="menu-trigger" onclick="openMenuAtTop(event)">⋮</span>
    </div>
    
    <div class="chat-box" id="chat-box"></div>


    <div class="input-panel">
<input type="file" id="file-input" style="display:none;">

<button id="file-btn" onclick="document.getElementById('file-input').click()">
    <img src="https://cdn-icons-png.flaticon.com/512/14537/14537726.png" alt="File" style="width: 35px; height: 35px;">
</button>
        <textarea id="message-input" placeholder="Паём..."></textarea>
        
       <div id="recording-ui">
    <div class="wave"></div>
    <div class="wave" style="animation-delay:0.2s"></div>
    <div class="wave" style="animation-delay:0.4s"></div>
    <span id="record-timer" class="recording-blink">0:00</span>
</div>

<div id="preview-ui" style="display: none; flex: 1; align-items: center; justify-content: space-between; background: white; padding: 5px 15px; border-radius: 20px;">
    
    <button onclick="cancelAudio()" class="btn" style="background:red; width: 60px; height: 60px;">🗑️</button>
    
    <span style="font-size: 14px; color: #555;">Садои сабтшуда</span>
    
    <button id="toggle-play-btn" onclick="toggleAudioPreview()" class="btn" style="background:#25d366; width: 40px; height: 40px;">▶</button>
    
</div>
        
       <button id="mic-btn" class="btn">
    <img src="https://cdn-icons-png.flaticon.com/512/3364/3364184.png" alt="Microphone" style="width: 24px; height: 24px;">
</button>
        <button id="stop-btn" class="btn" style="display:none; background:red;">
            <img src="https://cdn-icons-png.flaticon.com/512/18401/18401499.png" alt="Stop" style="width: 24px; height: 24px;">
        </button>
        <button id="send-btn" class="btn" onclick="sendMessage()" style="display: none;">➤</button>
    </div>
</body>
</html>
