<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJ CHAT</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved, update, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myId = localStorage.getItem("chat_user_id");
        if (!myId) {
            myId = "user_" + Math.floor(Math.random() * 1000000);
            localStorage.setItem("chat_user_id", myId);
        }

        // Режими интихоб
        let isSelectionMode = false;
        let selectedMessages = new Set();
        const menu = document.getElementById("custom-menu");
        const editModal = document.getElementById("edit-modal");
        const selectionPanel = document.getElementById("selection-panel");
        let activeMsgId = null;

        // Функсияҳои ирсол
        window.sendMessage = () => {
            const input = document.getElementById("message-input");
            if (input.value.trim() !== "") {
                const now = new Date();
                push(messagesRef, { text: input.value, senderId: myId, time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), date: now.toLocaleDateString() });
                input.value = "";
                input.style.height = "45px";
            }
        };

        // Логикаи интихоб
        window.enterSelectionMode = (msgKey) => {
            isSelectionMode = true;
            selectionPanel.style.display = "flex";
            menu.style.display = "none";
            toggleMessageSelection(msgKey);
        };

        function toggleMessageSelection(msgKey) {
            const el = document.getElementById(msgKey);
            if (selectedMessages.has(msgKey)) {
                selectedMessages.delete(msgKey);
                el.style.border = "";
            } else {
                selectedMessages.add(msgKey);
                el.style.border = "3px solid #007bff";
            }
        }

        window.cancelSelection = () => {
            isSelectionMode = false;
            selectedMessages.forEach(key => document.getElementById(key).style.border = "");
            selectedMessages.clear();
            selectionPanel.style.display = "none";
        };

        window.deleteSelected = () => {
            selectedMessages.forEach(key => remove(ref(db, 'messages/' + key)));
            cancelSelection();
        };

        // Менюи контекстӣ
        window.openMenu = (e, msgKey) => {
            e.preventDefault();
            if (isSelectionMode) return;
            activeMsgId = msgKey;
            menu.style.display = "block";
            menu.style.left = e.pageX + "px";
            menu.style.top = e.pageY + "px";
        };

        window.openEditModal = () => {
            document.getElementById("edit-input").value = document.getElementById(activeMsgId).querySelector('.msg-text').innerText;
            editModal.style.display = "flex";
            menu.style.display = "none";
        };

        window.saveEdit = () => {
            const newText = document.getElementById("edit-input").value;
            if (newText && activeMsgId) update(ref(db, 'messages/' + activeMsgId), { text: newText });
            editModal.style.display = "none";
        };

        document.addEventListener("click", (e) => {
            if (!e.target.closest('#custom-menu') && !e.target.closest('#edit-modal')) menu.style.display = "none";
        });

        // Навсозӣ ва намоиш
        onChildAdded(messagesRef, (data) => {
            const div = document.createElement("div");
            div.id = data.key;
            div.className = data.val().senderId === myId ? 'my-message' : 'received-message';
            div.innerHTML = `<div class="msg-text">${data.val().text}</div><div class="time-stamp">${data.val().time}</div>`;
            div.oncontextmenu = (e) => window.openMenu(e, data.key);
            div.onclick = () => { if(isSelectionMode) toggleMessageSelection(data.key); };
            document.getElementById("chat-box").appendChild(div);
        });

        onChildRemoved(messagesRef, (data) => { if(document.getElementById(data.key)) document.getElementById(data.key).remove(); });
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f0f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-box { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .my-message, .received-message { padding: 10px; max-width: 80%; cursor: pointer; border-radius: 15px; background: white; }
        #custom-menu, #selection-panel { display: none; position: absolute; background: white; border: 1px solid #ddd; z-index: 1000; padding: 10px; }
        #selection-panel { top: 0; width: 100%; display: flex; justify-content: space-between; }
        #edit-modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 85%; }
        .input-panel { padding: 10px; display: flex; gap: 8px; border-top: 1px solid #ddd; }
        textarea { flex: 1; height: 45px; border-radius: 20px; padding: 10px; }
        .btn { width: 45px; border-radius: 50%; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <div id="selection-panel">
        <button onclick="deleteSelected()" style="color:red">🗑️ Нест кардан</button>
        <button onclick="cancelSelection()">Бекор</button>
    </div>
    <div id="custom-menu">
        <button onclick="openEditModal()">✏️ Таҳрир</button>
        <button onclick="enterSelectionMode(activeMsgId)">☑️ Интихоб кардан</button>
    </div>
    <div id="edit-modal">
        <div class="modal-content">
            <textarea id="edit-input" style="width: 100%; height: 80px;"></textarea>
            <button onclick="saveEdit()">Сабт</button>
        </div>
    </div>
    <div class="chat-box" id="chat-box"></div>
    <div class="input-panel">
        <textarea id="message-input" placeholder="Паём..."></textarea>
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</body>
</html>
