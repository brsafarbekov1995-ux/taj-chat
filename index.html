<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJ CHAT</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myId = localStorage.getItem("chat_user_id");
        if (!myId) {
            myId = "user_" + Math.floor(Math.random() * 1000000);
            localStorage.setItem("chat_user_id", myId);
        }

        window.sendMessage = () => {
            const input = document.getElementById("message-input");
            if (input.value.trim() !== "") {
                const now = new Date();
                push(messagesRef, { 
                    text: input.value, 
                    senderId: myId, 
                    time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    date: now.toLocaleDateString()
                });
                input.value = "";
                input.style.height = "45px";
            }
        };

        window.deleteMessage = (key) => {
            remove(ref(db, 'messages/' + key));
        };

        document.addEventListener("DOMContentLoaded", () => {
            const input = document.getElementById("message-input");
            input.addEventListener("input", function() {
                this.style.height = "auto";
                this.style.height = (this.scrollHeight) + "px";
            });
        });

        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const msgKey = data.key;
            const chatBox = document.getElementById("chat-box");

            const div = document.createElement("div");
            div.className = msg.senderId === myId ? 'my-message' : 'received-message';
            div.id = `msg-${msgKey}`;
            
            // HTML-и паём
            div.innerHTML = `
                <div class="msg-content">${msg.text}</div>
                <div class="time-stamp">${msg.time}</div>
                <div class="delete-btn" onclick="deleteMessage('${msgKey}')" style="display:none;">×</div>
            `;

            // Логикаи Long Press (нигоҳ доштан)
            let timer;
            div.addEventListener('touchstart', () => {
                timer = setTimeout(() => {
                    if (msg.senderId === myId) {
                        div.querySelector('.delete-btn').style.display = 'block';
                        // Пас аз 5 сония тугмаро дубора пинҳон мекунем
                        setTimeout(() => div.querySelector('.delete-btn').style.display = 'none', 5000);
                    }
                }, 800); // 800 миллисония нигоҳ доштан
            });
            div.addEventListener('touchend', () => clearTimeout(timer));

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        onChildRemoved(messagesRef, (data) => {
            const el = document.getElementById(`msg-${data.key}`);
            if (el) el.remove();
        });
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f0f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .my-message, .received-message { padding: 10px; max-width: 80%; position: relative; border-radius: 15px; }
        .my-message { align-self: flex-end; background: #dcf8c6; }
        .received-message { align-self: flex-start; background: #fff; border: 1px solid #ddd; }
        .delete-btn { position: absolute; top: -10px; right: -10px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; text-align: center; line-height: 20px; font-size: 14px; cursor: pointer; }
        .time-stamp { font-size: 0.6rem; color: #888; text-align: right; }
        .input-panel { padding: 10px; display: flex; gap: 8px; align-items: center; background: #fff; }
        textarea { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; resize: none; }
        .btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #007bff; color: white; }
    </style>
</head>
<body>
    <div class="chat-box" id="chat-box"></div>
    <div class="input-panel">
        <textarea id="message-input" placeholder="Паём..."></textarea>
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</body>
</html>
