<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJ CHAT</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved, update, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myId = localStorage.getItem("chat_user_id");
        if (!myId) {
            myId = "user_" + Math.floor(Math.random() * 1000000);
            localStorage.setItem("chat_user_id", myId);
        }

        let selectedMessages = [];
        const menu = document.getElementById("custom-menu");
        const editModal = document.getElementById("edit-modal");

        // Функсияи ёддошти паёмҳои маҳаллӣ нестшуда
        const getHiddenMessages = () => JSON.parse(localStorage.getItem("hidden_msgs") || "[]");

        const linkify = (text) => {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, '<a href="$1" target="_blank" style="color: blue; text-decoration: underline;">$1</a>');
        };

        window.toggleSelect = (msgKey, element) => {
            if (selectedMessages.includes(msgKey)) {
                selectedMessages = selectedMessages.filter(id => id !== msgKey);
                element.classList.remove('selected-message');
            } else {
                selectedMessages.push(msgKey);
                element.classList.add('selected-message');
            }
        };

        window.openMenuAtTop = (e) => {
            e.stopPropagation();
            if (selectedMessages.length === 0) {
                alert("Лутфан аввал паёмеро интихоб кунед!");
                return;
            }
            menu.style.display = "block";
            menu.style.right = "20px";
            menu.style.top = "60px";
        };

        document.addEventListener("click", (e) => {
            if (!e.target.closest('#custom-menu') && !e.target.closest('#edit-modal') && !e.target.closest('#menu-trigger')) {
                menu.style.display = "none";
            }
        });

        window.sendMessage = () => {
            const input = document.getElementById("message-input");
            const textToSend = input.value;
            if (textToSend.trim() !== "") {
                const now = new Date();
                push(messagesRef, { 
                    text: textToSend, 
                    senderId: myId, 
                    time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    date: now.toLocaleDateString()
                });
                input.value = "";
            }
        };

        window.copyMessage = () => {
            if (selectedMessages.length > 0) {
                const el = document.getElementById(selectedMessages[0]);
                if(el) navigator.clipboard.writeText(el.querySelector('.msg-text').innerText);
            }
            menu.style.display = "none";
        };

        window.openEditModal = () => {
            if (selectedMessages.length > 0) {
                const el = document.getElementById(selectedMessages[0]);
                document.getElementById("edit-input").value = el.querySelector('.msg-text').innerText;
                editModal.style.display = "flex";
            }
            menu.style.display = "none";
        };

        window.saveEdit = () => {
            const newText = document.getElementById("edit-input").value;
            if (newText && selectedMessages.length > 0) {
                update(ref(db, 'messages/' + selectedMessages[0]), { text: newText });
            }
            editModal.style.display = "none";
        };

        window.deleteSelected = (type) => {
            selectedMessages.forEach(msgKey => {
                if (type === 'me') {
                    // Пинҳон кардан аз худам (тавассути localStorage)
                    let hidden = getHiddenMessages();
                    hidden.push(msgKey);
                    localStorage.setItem("hidden_msgs", JSON.stringify(hidden));
                    const el = document.getElementById(msgKey);
                    if (el) el.remove();
                } else if (type === 'everyone') {
                    // Нест кардан аз база (барои ҳама)
                    remove(ref(db, 'messages/' + msgKey));
                }
            });
            selectedMessages = [];
            document.querySelectorAll('.selected-message').forEach(el => el.classList.remove('selected-message'));
            menu.style.display = "none";
        };

        window.clearMyChat = () => {
            if (confirm("Оё боварӣ доред, ки чатро тоза мекунед?")) {
                document.getElementById("chat-box").innerHTML = "";
                localStorage.setItem("hidden_msgs", "[]");
                menu.style.display = "none";
            }
        };

        // Танзим барои навсозӣ: Агар касе аз база нест кунад, аз экрани ҳама пок мешавад
        onChildRemoved(messagesRef, (data) => {
            const el = document.getElementById(data.key);
            if (el) el.remove();
        });

        // Боргузории паёмҳо бо назардошти рӯйхати пинҳоншудаҳо
        onChildAdded(messagesRef, (data) => {
            if (getHiddenMessages().includes(data.key)) return;

            const msg = data.val();
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.id = data.key;
            div.className = msg.senderId === myId ? 'my-message' : 'received-message';
            div.innerHTML = `<div class="msg-text">${linkify(msg.text)}</div><div class="time-stamp">${msg.time}</div>`;
            div.onclick = () => window.toggleSelect(data.key, div);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f0f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #fff; padding: 15px; margin: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; border-radius: 15px; border: 1px solid #ddd; }
        #menu-trigger { cursor: pointer; font-size: 24px; padding: 0 10px; }
        .selected-message { background-color: #add8e6 !important; border: 2px solid #007bff !important; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        .my-message, .received-message { padding: 10px; max-width: 80%; word-wrap: break-word; cursor: pointer; border-radius: 15px; }
        .my-message { align-self: flex-end; background: #dcf8c6; }
        .received-message { align-self: flex-start; background: #fff; border: 1px solid #ddd; }
        #custom-menu { display: none; position: absolute; background: white; border: 1px solid #ddd; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); z-index: 1000; width: 220px; padding: 8px 0; }
        #custom-menu button { display: block; width: 100%; padding: 12px 20px; border: none; background: none; text-align: left; cursor: pointer; font-size: 15px; }
        #custom-menu button:hover { background: #f0f0f0; }
        #edit-modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .input-panel { padding: 10px; background: #fff; display: flex; gap: 8px; border-top: 1px solid #ddd; }
        textarea { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; height: 45px; resize: none; }
        .btn { width: 45px; border-radius: 50%; border: none; background: #007bff; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="custom-menu">
        <button onclick="copyMessage()">📋 Нусха кардан</button>
        <button onclick="openEditModal()">✏️ Таҳрир</button>
        <button onclick="deleteSelected('me')">👁️ Нест кардан (аз худам)</button>
        <button onclick="deleteSelected('everyone')" style="color: red;">🗑️ Нест кардан (аз ҳама)</button>
        <button onclick="clearMyChat()" style="color: orange; border-top: 1px solid #eee;">🧹 Тоза кардани чат (аз худам)</button>
    </div>

    <div id="edit-modal">
        <div class="modal-content">
            <textarea id="edit-input" style="width: 100%; height: 80px;"></textarea>
            <div class="modal-buttons">
                <button onclick="document.getElementById('edit-modal').style.display='none'" style="background:#e0e0e0;">Бекор</button>
                <button onclick="saveEdit()" style="background:#007bff; color:white;">Сабт кардан</button>
            </div>
        </div>
    </div>

    <div class="header">
        <span></span>
        <div>TAJ CHAT</div>
        <span id="menu-trigger" onclick="openMenuAtTop(event)">⋮</span>
    </div>
    
    <div class="chat-box" id="chat-box"></div>
    
    <div class="input-panel">
        <textarea id="message-input" placeholder="Паём..."></textarea>
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</body>
</html>
