<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJ CHAT</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myId = localStorage.getItem("chat_user_id");
        if (!myId) {
            myId = "user_" + Math.floor(Math.random() * 1000000);
            localStorage.setItem("chat_user_id", myId);
        }

        window.sendMessage = (textFromDrag = null) => {
            const input = document.getElementById("message-input");
            const textToSend = textFromDrag || input.value;
            
            if (textToSend.trim() !== "") {
                const now = new Date();
                push(messagesRef, { 
                    text: textToSend, 
                    senderId: myId, 
                    time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    date: now.toLocaleDateString()
                });
                if (!textFromDrag) {
                    input.value = "";
                    input.style.height = "45px";
                }
            }
        };

        // Функсия барои нест кардани паём
        window.deleteMessage = (key) => {
            remove(ref(db, 'messages/' + key));
        };

        document.addEventListener("DOMContentLoaded", () => {
            const input = document.getElementById("message-input");
            const chatBox = document.getElementById("chat-box");

            input.addEventListener("keypress", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    window.sendMessage();
                }
            });

            input.addEventListener("input", function() {
                this.style.height = "auto";
                this.style.height = (this.scrollHeight) + "px";
            });
        });

        let lastDate = ""; 
        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const msgKey = data.key;
            const chatBox = document.getElementById("chat-box");

            if (msg.date !== lastDate) {
                const dateDiv = document.createElement("div");
                dateDiv.className = 'date-divider';
                dateDiv.textContent = msg.date;
                chatBox.appendChild(dateDiv);
                lastDate = msg.date;
            }

            const div = document.createElement("div");
            div.className = msg.senderId === myId ? 'my-message' : 'received-message';
            div.id = `msg-${msgKey}`; // ID барои пайдо кардани паём

            // Тугмаи нест кардан танҳо барои паёмҳои шахсӣ
            let deleteBtn = "";
            if (msg.senderId === myId) {
                deleteBtn = `<span style="cursor:pointer; margin-left:8px; color:#ff4d4d; font-weight:bold;" onclick="deleteMessage('${msgKey}')">×</span>`;
            }

            div.innerHTML = `<div>${msg.text} ${deleteBtn}</div><div class="time-stamp">${msg.time}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // Нест кардани элемент аз экран ҳангоми аз база нест шудан
        onChildRemoved(messagesRef, (data) => {
            const el = document.getElementById(`msg-${data.key}`);
            if (el) el.remove();
        });
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f0f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .header { flex: 0 0 auto; background: #ffffff; color: #333; padding: 15px; margin: 10px; text-align: center; font-weight: bold; border-radius: 15px; border: 1px solid #ddd; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #ffffff; }
        .my-message, .received-message { padding: 10px; max-width: 80%; word-wrap: break-word; position: relative; }
        .my-message { align-self: flex-end; background: #dcf8c6; border-radius: 15px 15px 0 15px; }
        .received-message { align-self: flex-start; background: #fff; border: 1px solid #ddd; border-radius: 15px 15px 15px 0; }
        .date-divider { align-self: center; background: #ccc; color: #fff; padding: 5px 15px; border-radius: 15px; font-size: 0.7rem; margin: 10px 0; }
        .time-stamp { font-size: 0.6rem; color: #888; margin-top: 4px; text-align: right; }
        .input-panel { flex: 0 0 auto; padding: 10px; background: #ffffff; display: flex; gap: 8px; align-items: center; border-top: 1px solid #eee; }
        textarea { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; resize: none; height: 45px; max-height: 120px; outline: none; }
        .btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #007bff; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">TAJ CHAT</div>
    <div class="chat-box" id="chat-box"></div>
    <div class="input-panel">
        <textarea id="message-input" placeholder="Паём..."></textarea>
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</body>
</html>
