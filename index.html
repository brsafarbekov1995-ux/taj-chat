<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJ CHAT</title>
    <style>
        /* Ислоҳи асосӣ барои нест кардани ҷустуҷӯи Google */
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            -webkit-user-select: none; /* Манъи интихоби матн */
            user-select: none;
            -webkit-touch-callout: none; /* Манъи менюи браузер дар мобил */
            touch-action: manipulation;
        }
        
        /* Иҷозат додан ба навиштан дар дохили textarea */
        textarea { -webkit-user-select: text; user-select: text; }

        body { font-family: sans-serif; background: #f0f0f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: #fff; padding: 12px 15px; margin: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; border-radius: 15px; border: 1px solid #ddd; }
        
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        .my-message, .received-message { padding: 10px; max-width: 80%; word-wrap: break-word; cursor: pointer; }
        .my-message { align-self: flex-end; background: #dcf8c6; border-radius: 15px 15px 0 15px; }
        .received-message { align-self: flex-start; background: #fff; border: 1px solid #ddd; border-radius: 15px 15px 15px 0; }
        
        .date-divider { align-self: center; background: #ccc; color: #fff; padding: 5px 15px; border-radius: 15px; font-size: 0.7rem; }
        .time-stamp { font-size: 0.6rem; color: #888; text-align: right; }
        
        #custom-menu { display: none; position: absolute; background: white; border: 1px solid #ddd; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); z-index: 1000; width: 220px; padding: 8px 0; }
        #custom-menu button { display: block; width: 100%; padding: 12px 20px; border: none; background: none; text-align: left; cursor: pointer; font-size: 15px; }
        #custom-menu button:hover { background: #f0f0f0; }

        #edit-modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .input-panel { padding: 10px; background: #fff; display: flex; gap: 8px; border-top: 1px solid #ddd; }
        .input-panel textarea { flex: 1; height: 45px; border-radius: 20px; border: 1px solid #ddd; padding: 10px; resize: none; }
        .btn { width: 45px; border-radius: 50%; border: none; background: #007bff; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="custom-menu">
        <button onclick="copyMessage()">📋 Нусха кардан</button>
        <button onclick="openEditModal()">✏️ Таҳрир</button>
        <button onclick="deleteForMe()">👁️ Нест кардан (аз худам)</button>
        <button onclick="deleteForEveryone()" style="color: red; border-top: 1px solid #eee;">🗑️ Нест кардан (аз ҳама)</button>
    </div>

    <div id="edit-modal">
        <div class="modal-content">
            <textarea id="edit-input" style="width: 100%; height: 80px; padding:10px; border-radius:10px; border:1px solid #ddd;"></textarea>
            <div class="modal-buttons">
                <button onclick="document.getElementById('edit-modal').style.display='none'" style="background:#e0e0e0;">Бекор</button>
                <button onclick="saveEdit()" style="background:#007bff; color:white;">Сабт кардан</button>
            </div>
        </div>
    </div>

    <div class="header">
        <span>TAJ CHAT</span>
        <button onclick="openHeaderMenu(event)" style="border: none; background: none; font-size: 24px; cursor: pointer; padding: 0 5px;">⋮</button>
    </div>

    <div class="chat-box" id="chat-box"></div>

    <div class="input-panel">
        <textarea id="message-input" placeholder="Паём..."></textarea>
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved, update, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');
        let myId = localStorage.getItem("chat_user_id") || "user_" + Math.floor(Math.random() * 1000000);
        localStorage.setItem("chat_user_id", myId);

        const menu = document.getElementById("custom-menu");
        const editModal = document.getElementById("edit-modal");
        let activeMsgId = null;

        // Пайвандсозӣ
        const linkify = (text) => text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color: blue;">$1</a>');

        window.sendMessage = () => {
            const input = document.getElementById("message-input");
            if (input.value.trim() !== "") {
                const now = new Date();
                push(messagesRef, { text: input.value, senderId: myId, time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), date: now.toLocaleDateString() });
                input.value = "";
            }
        };

        window.openMenu = (e, msgKey) => {
            e.preventDefault();
            activeMsgId = msgKey;
            menu.style.display = "block";
            menu.style.left = e.pageX + "px";
            menu.style.top = e.pageY + "px";
        };

        window.openHeaderMenu = (e) => {
            e.stopPropagation();
            menu.style.display = "block";
            menu.style.left = (e.clientX - 150) + "px";
            menu.style.top = (e.clientY + 10) + "px";
        };

        window.copyMessage = () => {
            const el = document.getElementById(activeMsgId);
            if (el) navigator.clipboard.writeText(el.querySelector('.msg-text').innerText);
            menu.style.display = "none";
        };

        window.openEditModal = () => {
            const el = document.getElementById(activeMsgId);
            if (el) {
                document.getElementById("edit-input").value = el.querySelector('.msg-text').innerText;
                editModal.style.display = "flex";
            }
            menu.style.display = "none";
        };

        window.saveEdit = () => {
            const newText = document.getElementById("edit-input").value;
            if (newText && activeMsgId) update(ref(db, 'messages/' + activeMsgId), { text: newText });
            editModal.style.display = "none";
        };

        window.deleteForEveryone = () => {
            if (activeMsgId) remove(ref(db, 'messages/' + activeMsgId));
            menu.style.display = "none";
        };

        window.deleteForMe = () => {
            const el = document.getElementById(activeMsgId);
            if (el) el.style.display = "none";
            menu.style.display = "none";
        };

        document.addEventListener("click", () => menu.style.display = "none");

        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const div = document.createElement("div");
            div.id = data.key;
            div.className = msg.senderId === myId ? 'my-message' : 'received-message';
            div.innerHTML = `<div class="msg-text">${linkify(msg.text)}</div><div class="time-stamp">${msg.time}</div>`;
            div.oncontextmenu = (e) => window.openMenu(e, data.key);
            document.getElementById("chat-box").appendChild(div);
        });

        onChildRemoved(messagesRef, (data) => {
            const el = document.getElementById(data.key);
            if (el) el.remove();
        });
    </script>
</head>
<body>
    <div id="custom-menu">
        <button onclick="copyMessage()">📋 Нусха кардан</button>
        <button onclick="openEditModal()">✏️ Таҳрир</button>
        <button onclick="deleteForMe()">👁️ Нест кардан (аз худам)</button>
        <button onclick="deleteForEveryone()" style="color: red; border-top: 1px solid #eee;">🗑️ Нест кардан (аз ҳама)</button>
    </div>

    <div id="edit-modal">
        <div class="modal-content">
            <textarea id="edit-input" style="width: 100%; height: 80px; padding:10px; border-radius:10px; border:1px solid #ddd;"></textarea>
            <div class="modal-buttons">
                <button onclick="document.getElementById('edit-modal').style.display='none'" style="background:#e0e0e0;">Бекор</button>
                <button onclick="saveEdit()" style="background:#007bff; color:white;">Сабт кардан</button>
            </div>
        </div>
    </div>

   <div class="header">
    <span>TAJ CHAT</span>
    <button onclick="openHeaderMenu(event)" style="float: right; border: none; background: none; font-size: 20px; cursor: pointer;">⋮</button>
</div>
    <div class="chat-box" id="chat-box"></div>
    <div class="input-panel">
        <textarea id="message-input" placeholder="Паём..."></textarea>
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</body>
</html>
