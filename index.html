<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJ CHAT</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, update, onChildRemoved } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myId = localStorage.getItem("chat_user_id") || "user_" + Math.floor(Math.random() * 1000000);
        localStorage.setItem("chat_user_id", myId);

        let lastDate = "";
        let selectedMessages = [];
        const menu = document.getElementById("custom-menu");
        const trigger = document.getElementById("menu-trigger");

        window.closeModal = (id) => { document.getElementById(id).style.display = "none"; };
        window.openMenuAtTop = (e) => { e.stopPropagation(); menu.classList.toggle('show'); };
        
        // Функсияҳои модалҳо
        window.showDeleteModal = () => { document.getElementById("delete-modal").style.display = "flex"; menu.classList.remove('show'); };
        window.showClearModal = () => { document.getElementById("clear-modal").style.display = "flex"; menu.classList.remove('show'); };
        window.openEditModal = () => { 
            if (selectedMessages.length > 0) { 
                document.getElementById("edit-input").value = document.getElementById(selectedMessages[0]).querySelector('.msg-text').innerText; 
                document.getElementById("edit-modal").style.display = "flex"; 
            } 
            menu.classList.remove('show'); 
        };

        window.clearAllMessages = () => {
            remove(messagesRef);
            document.getElementById("chat-box").innerHTML = "";
            lastDate = "";
            closeModal('clear-modal');
        };

        window.deleteSelected = (type) => {
            selectedMessages.forEach(msgKey => {
                if (type === 'me') {
                    let hidden = JSON.parse(localStorage.getItem("hidden_msgs") || "[]");
                    hidden.push(msgKey);
                    localStorage.setItem("hidden_msgs", JSON.stringify(hidden));
                    document.getElementById(msgKey)?.remove();
                } else remove(ref(db, 'messages/' + msgKey));
            });
            selectedMessages = [];
            trigger.style.visibility = "hidden";
            closeModal('delete-modal');
        };

        window.saveEdit = () => {
            const newText = document.getElementById("edit-input").value;
            if (newText && selectedMessages.length > 0) update(ref(db, 'messages/' + selectedMessages[0]), { text: newText });
            closeModal('edit-modal');
        };

        window.toggleSelect = (msgKey, element) => {
            if (selectedMessages.includes(msgKey)) {
                selectedMessages = selectedMessages.filter(id => id !== msgKey);
                element.classList.remove('selected-message');
            } else {
                selectedMessages.push(msgKey);
                element.classList.add('selected-message');
            }
            trigger.style.visibility = selectedMessages.length > 0 ? "visible" : "hidden";
        };

        onChildRemoved(messagesRef, (data) => { document.getElementById(data.key)?.remove(); });

        window.sendMessage = () => {
            const input = document.getElementById("message-input");
            if (input.value.trim() !== "") {
                const now = new Date();
                push(messagesRef, { text: input.value, senderId: myId, time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), date: now.toLocaleDateString() });
                input.value = "";
            }
        };

        onChildAdded(messagesRef, (data) => {
            let hidden = JSON.parse(localStorage.getItem("hidden_msgs") || "[]");
            if (hidden.includes(data.key)) return;
            const msg = data.val();
            const div = document.createElement("div");
            div.id = data.key;
            div.className = `msg-bubble ${msg.senderId === myId ? 'my-msg' : 'rec-msg'}`;
            div.innerHTML = `<div class="msg-text">${msg.text}</div><div class="msg-time">${msg.time}</div>`;
            div.onclick = () => window.toggleSelect(data.key, div);
            document.getElementById("chat-box").appendChild(div);
            document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
        });
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; height: 100dvh; display: flex; flex-direction: column; }
        
        /* Модалҳои зебо */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-bottom: 20px; color: #333; }
        .modal-btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-danger { background: #e53935; color: white; }
        .btn-danger:hover { background: #d32f2f; }
        .btn-main { background: #075e54; color: white; }
        .btn-cancel { background: #f0f0f0; color: #333; }

        /* Унсурҳои чат */
        .header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { padding: 8px 12px 22px; border-radius: 10px; max-width: 80%; width: fit-content; position: relative; background: white; }
        .my-msg { align-self: flex-end; background: #dcf8c6; }
        .selected-message { background-color: #95c7f0 !important; }
        
        #custom-menu { position: absolute; right: 20px; top: 60px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 999; display: none; padding: 5px; }
        #custom-menu.show { display: block; }
        #custom-menu button { display: block; width: 100%; padding: 10px; border: none; background: none; cursor: pointer; text-align: left; }
    </style>
</head>
<body>
    <div id="custom-menu">
        <button onclick="openEditModal()">✏️ Таҳрир</button>
        <button onclick="showDeleteModal()">🗑️ Нест кардан</button>
        <button onclick="showClearModal()" style="color: red;">🧹 Пок кардани чат</button>
    </div>

    <div id="delete-modal" class="modal-overlay" onclick="closeModal('delete-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>Нест кардан?</h3>
            <button class="modal-btn btn-main" onclick="deleteSelected('me')">Аз худам</button>
            <button class="modal-btn btn-danger" onclick="deleteSelected('everyone')">Аз ҳама</button>
            <button class="modal-btn btn-cancel" onclick="closeModal('delete-modal')">Бекор кардан</button>
        </div>
    </div>

    <div id="clear-modal" class="modal-overlay" onclick="closeModal('clear-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>Ҳамаи паёмҳо пок шаванд?</h3>
            <p style="color: #666; margin-bottom: 20px;">Ин амал бозгашт надорад.</p>
            <button class="modal-btn btn-danger" onclick="clearAllMessages()">Ҳа, пок кунед</button>
            <button class="modal-btn btn-cancel" onclick="closeModal('clear-modal')">Бекор кардан</button>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay" onclick="closeModal('edit-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <textarea id="edit-input" style="width: 100%; padding: 10px; border-radius: 10px;"></textarea>
            <button class="modal-btn btn-main" onclick="saveEdit()">Сабт</button>
        </div>
    </div>

    <div class="header"> <span>TAJ CHAT</span> <span id="menu-trigger" onclick="openMenuAtTop(event)">⋮</span> </div>
    <div class="chat-box" id="chat-box"></div>
    <div class="input-panel" style="padding: 10px; background: #f0f0f0; display: flex; gap: 8px;">
        <textarea id="message-input" placeholder="Паём..."></textarea>
        <button class="btn" onclick="sendMessage()" style="border-radius: 50%; width: 45px; border: none; background: #075e54; color: white;">➤</button>
    </div>
</body>
</html>
