<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJ CHAT</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved, update, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myId = localStorage.getItem("chat_user_id");
        if (!myId) {
            myId = "user_" + Math.floor(Math.random() * 1000000);
            localStorage.setItem("chat_user_id", myId);
        }

        const menu = document.getElementById("custom-menu");
        const editModal = document.getElementById("edit-modal");
        let activeMsgId = null;

        // Пӯшидани меню бо клик дар ҳама ҷо
        document.addEventListener("click", (e) => {
            if (!e.target.closest('#custom-menu') && !e.target.closest('#edit-modal')) {
                menu.style.display = "none";
            }
        });

        window.sendMessage = () => {
            const input = document.getElementById("message-input");
            const textToSend = input.value;
            if (textToSend.trim() !== "") {
                const now = new Date();
                push(messagesRef, { 
                    text: textToSend, 
                    senderId: myId, 
                    time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    date: now.toLocaleDateString()
                });
                input.value = "";
                input.style.height = "45px";
            }
        };

        window.openMenu = (e, msgKey) => {
            e.preventDefault();
            activeMsgId = msgKey;
            menu.style.display = "block";
            
            let x = e.pageX;
            let y = e.pageY;
            // Адаптация барои берун нарафтан аз экран
            if (x + menu.offsetWidth > window.innerWidth) x = window.innerWidth - menu.offsetWidth - 10;
            if (y + menu.offsetHeight > window.innerHeight) y = window.innerHeight - menu.offsetHeight - 10;

            menu.style.left = x + "px";
            menu.style.top = y + "px";
        };

        window.openEditModal = () => {
            const currentText = document.getElementById(activeMsgId).querySelector('.msg-text').innerText;
            document.getElementById("edit-input").value = currentText;
            editModal.style.display = "flex";
            menu.style.display = "none";
        };

        window.saveEdit = () => {
            const newText = document.getElementById("edit-input").value;
            if (newText && activeMsgId) {
                update(ref(db, 'messages/' + activeMsgId), { text: newText });
            }
            editModal.style.display = "none";
        };

        window.deleteForMe = () => {
            const el = document.getElementById(activeMsgId);
            if (el) el.style.display = "none";
            menu.style.display = "none";
        };

        window.deleteForEveryone = () => {
            if (activeMsgId) remove(ref(db, 'messages/' + activeMsgId));
            menu.style.display = "none";
        };

        onValue(messagesRef, (snapshot) => {
            snapshot.forEach((child) => {
                const el = document.getElementById(child.key);
                if (el) el.querySelector('.msg-text').innerText = child.val().text;
            });
        });

        onChildRemoved(messagesRef, (data) => {
            const el = document.getElementById(data.key);
            if (el) el.remove();
        });

        let lastDate = "";
        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const chatBox = document.getElementById("chat-box");
            if (msg.date !== lastDate) {
                const dateDiv = document.createElement("div");
                dateDiv.className = 'date-divider';
                dateDiv.textContent = msg.date;
                chatBox.appendChild(dateDiv);
                lastDate = msg.date;
            }
            
            const div = document.createElement("div");
            div.id = data.key;
            div.className = msg.senderId === myId ? 'my-message' : 'received-message';
            div.innerHTML = `<div class="msg-text">${msg.text}</div><div class="time-stamp">${msg.time}</div>`;
            div.oncontextmenu = (e) => window.openMenu(e, data.key);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f0f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #fff; padding: 15px; margin: 10px; text-align: center; font-weight: bold; border-radius: 15px; border: 1px solid #ddd; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        .my-message, .received-message { padding: 10px; max-width: 80%; word-wrap: break-word; cursor: pointer; }
        .my-message { align-self: flex-end; background: #dcf8c6; border-radius: 15px 15px 0 15px; }
        .received-message { align-self: flex-start; background: #fff; border: 1px solid #ddd; border-radius: 15px 15px 15px 0; }
        .date-divider { align-self: center; background: #ccc; color: #fff; padding: 5px 15px; border-radius: 15px; font-size: 0.7rem; }
        .time-stamp { font-size: 0.6rem; color: #888; text-align: right; }
        
        #custom-menu { display: none; position: absolute; background: white; border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 1000; width: 200px; }
        #custom-menu button { display: block; width: 100%; padding: 12px; border: none; background: none; text-align: left; cursor: pointer; border-bottom: 1px solid #eee; }
        
        #edit-modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 85%; }
        
        .input-panel { padding: 10px; background: #fff; display: flex; gap: 8px; border-top: 1px solid #ddd; }
        textarea { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; height: 45px; resize: none; }
        .btn { width: 45px; border-radius: 50%; border: none; background: #007bff; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="custom-menu">
        <button onclick="openEditModal()">✏️ Таҳрир</button>
        <button onclick="deleteForMe()">👁️ Нест кардан (аз худам)</button>
        <button onclick="deleteForEveryone()" style="color: red;">🗑️ Нест кардан (аз ҳама)</button>
    </div>

    <div id="edit-modal">
        <div class="modal-content">
            <textarea id="edit-input" style="width: 100%; height: 80px;"></textarea>
            <div style="margin-top:10px;">
                <button onclick="saveEdit()">Сабт</button>
                <button onclick="document.getElementById('edit-modal').style.display='none'">Бекор</button>
            </div>
        </div>
    </div>

    <div class="header">TAJ CHAT</div>
    <div class="chat-box" id="chat-box"></div>
    <div class="input-panel">
        <textarea id="message-input" placeholder="Паём..."></textarea>
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</body>
</html>
