<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAJ CHAT</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myId = localStorage.getItem("chat_user_id");
        if (!myId) {
            myId = "user_" + Math.floor(Math.random() * 1000000);
            localStorage.setItem("chat_user_id", myId);
        }

        window.sendMessage = (textFromDrag = null) => {
            const input = document.getElementById("message-input");
            const textToSend = textFromDrag || input.value;
            
            if (textToSend.trim() !== "") {
                const now = new Date();
                push(messagesRef, { 
                    text: textToSend, 
                    senderId: myId, 
                    time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    date: now.toLocaleDateString()
                });
                if (!textFromDrag) {
                    input.value = "";
                    input.style.height = "45px";
                }
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            const input = document.getElementById("message-input");
            const chatBox = document.getElementById("chat-box");

            input.addEventListener("input", function() {
                this.style.height = "auto";
                this.style.height = (this.scrollHeight) + "px";
            });

            // Drag and Drop (Ислоҳшуда)
            input.setAttribute("draggable", "true");
            input.addEventListener("dragstart", (e) => e.dataTransfer.setData("text/plain", input.value));
            chatBox.addEventListener("dragover", (e) => e.preventDefault());
            chatBox.addEventListener("drop", (e) => {
                e.preventDefault();
                const text = e.dataTransfer.getData("text/plain");
                if (text) { 
                    window.sendMessage(text); 
                    input.value = "";              // Акнун холӣ мешавад
                    input.style.height = "45px";   // Баландии аслӣ бармегардад
                }
            });

            // Touch Gestures
            let touchStartY = 0;
            input.addEventListener("touchstart", (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
            input.addEventListener("touchend", (e) => {
                const touchEndY = e.changedTouches[0].clientY;
                if (touchStartY - touchEndY > 50) {
                    window.sendMessage(input.value);
                    input.value = "";
                    input.style.height = "45px";
                }
            }, { passive: true });
        });

        let lastDate = ""; 
        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const chatBox = document.getElementById("chat-box");
            if (msg.date !== lastDate) {
                const dateDiv = document.createElement("div");
                dateDiv.className = 'date-divider';
                dateDiv.textContent = msg.date;
                chatBox.appendChild(dateDiv);
                lastDate = msg.date;
            }
            const div = document.createElement("div");
            div.className = msg.senderId === myId ? 'my-message' : 'received-message';
            div.innerHTML = `<div>${msg.text}</div><div class="time-stamp">${msg.time}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #ffffff; height: 100dvh; display: flex; flex-direction: column; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #ffffff; }
        
        .my-message, .received-message { 
            padding: 10px; max-width: 80%; 
            word-wrap: break-word; overflow-wrap: break-word; word-break: break-word; 
        }
        .my-message { align-self: flex-end; background: #dcf8c6; border-radius: 15px 15px 0 15px; }
        .received-message { align-self: flex-start; background: #fff; border: 1px solid #ddd; border-radius: 15px 15px 15px 0; }
        
        .date-divider { align-self: center; background: #ccc; color: #fff; padding: 5px 15px; border-radius: 15px; font-size: 0.7rem; margin: 10px 0; }
        .time-stamp { font-size: 0.6rem; color: #888; margin-top: 4px; text-align: right; }
        
        .input-panel { padding: 10px; background: #ffffff; display: flex; gap: 8px; align-items: flex-end; border-top: 1px solid #ddd; }
        textarea { 
            flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; 
            resize: none; height: 45px; max-height: 120px; overflow-y: auto; line-height: 1.4;
        }
        .btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #007bff; color: white; cursor: pointer; flex-shrink: 0; }
        
        /* 1. Панели вурудро каме шаффоф мекунем (ё градиент медиҳем) */
        .input-panel {
            padding: 10px;
            background: linear-gradient(to top, rgba(255, 255, 255, 1) 90%, rgba(255, 255, 255, 0));
            display: flex;
            gap: 8px;
            align-items: flex-end;
            border-top: none; 
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        /* 2. Ба чат-бокс эффект медиҳем, ки паёмҳо дар охир хира шаванд */
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #ffffff;
            mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
        }
    </style>
</head>
<body>
    <div class="chat-box" id="chat-box"></div>
    <div class="input-panel">
        <textarea id="message-input" placeholder="Паём..."></textarea>
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</body>
</html>
