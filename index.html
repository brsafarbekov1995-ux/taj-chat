<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJ CHAT</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, update, onChildRemoved, onChildChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myId = localStorage.getItem("chat_user_id") || "user_" + Math.floor(Math.random() * 1000000);
        localStorage.setItem("chat_user_id", myId);

        let lastDate = "";
        let selectedMessages = [];
        const menu = document.getElementById("custom-menu");
        const trigger = document.getElementById("menu-trigger");

        window.closeModal = (id) => { document.getElementById(id).style.display = "none"; };

        window.toggleSelect = (msgKey, element) => {
            if (selectedMessages.includes(msgKey)) {
                selectedMessages = selectedMessages.filter(id => id !== msgKey);
                element.classList.remove('selected-message');
            } else {
                selectedMessages.push(msgKey);
                element.classList.add('selected-message');
            }
            trigger.style.visibility = selectedMessages.length > 0 ? "visible" : "hidden";
        };

        window.openMenuAtTop = (e) => { e.stopPropagation(); menu.classList.toggle('show'); };

        document.addEventListener("click", (e) => {
            if (!e.target.closest('#custom-menu') && !e.target.closest('#menu-trigger')) {
                menu.classList.remove('show');
            }
        });

        window.copyMessage = () => {
            if (selectedMessages.length > 0) navigator.clipboard.writeText(document.getElementById(selectedMessages[0]).querySelector('.msg-text').innerText);
            menu.classList.remove('show');
        };

        window.openEditModal = () => {
            if (selectedMessages.length > 0) {
                const msgKey = selectedMessages[0];
                const msgElement = document.getElementById(msgKey);
                
                // Танҳо агар паём класси "my-msg" дошта бошад (паёми худи корбар бошад), онро таҳрир кардан мумкин аст
                if (msgElement.classList.contains('my-msg')) {
                    const textElement = msgElement.querySelector('.msg-text');
                    document.getElementById("edit-input").value = textElement.innerText;
                    document.getElementById("edit-modal").style.display = "flex";
                }
            }
            menu.classList.remove('show');
        };

        window.saveEdit = () => {
            const newText = document.getElementById("edit-input").value;
            const msgKey = selectedMessages[0];
            if (newText && msgKey) {
                update(ref(db, 'messages/' + msgKey), { text: newText });
            }
            closeModal('edit-modal');
            selectedMessages.forEach(id => document.getElementById(id).classList.remove('selected-message'));
            selectedMessages = [];
            trigger.style.visibility = "hidden";
        };

        window.showDeleteModal = () => { document.getElementById("delete-modal").style.display = "flex"; menu.classList.remove('show'); };

        window.clearAllMessages = () => {
            remove(messagesRef);
            document.getElementById("chat-box").innerHTML = "";
            lastDate = ""; 
            menu.classList.remove('show');
            trigger.style.visibility = "hidden";
        };

        window.deleteSelected = (type) => {
            selectedMessages.forEach(msgKey => {
                if (type === 'me') {
                    let hidden = JSON.parse(localStorage.getItem("hidden_msgs") || "[]");
                    hidden.push(msgKey);
                    localStorage.setItem("hidden_msgs", JSON.stringify(hidden));
                    document.getElementById(msgKey)?.remove();
                } else remove(ref(db, 'messages/' + msgKey));
            });
            selectedMessages = []; 
            trigger.style.visibility = "hidden";
            closeModal('delete-modal');
        };

        window.sendMessage = () => {
            const input = document.getElementById("message-input");
            if (input.value.trim() !== "") {
                const now = new Date();
                push(messagesRef, { 
                    text: input.value, 
                    senderId: myId, 
                    time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    date: now.toLocaleDateString()
                });
                input.value = "";
            }
        };

        onChildAdded(messagesRef, (data) => {
            let hidden = JSON.parse(localStorage.getItem("hidden_msgs") || "[]");
            if (hidden.includes(data.key)) return;
            
            const msg = data.val();
            const currentDate = msg.date || "Имрӯз";
            
            if (currentDate !== lastDate) {
                const dateDiv = document.createElement("div");
                dateDiv.className = "date-divider";
                dateDiv.innerText = currentDate;
                document.getElementById("chat-box").appendChild(dateDiv);
                lastDate = currentDate;
            }

            const div = document.createElement("div");
            div.id = data.key;
            div.className = `msg-bubble ${msg.senderId === myId ? 'my-msg' : 'rec-msg'}`;
            div.innerHTML = `<div class="msg-text">${msg.text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>')}</div><div class="msg-time">${msg.time}</div>`;
            div.onclick = () => window.toggleSelect(data.key, div);
            document.getElementById("chat-box").appendChild(div);
            document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
        });

        onChildRemoved(messagesRef, (data) => {
            const element = document.getElementById(data.key);
            if (element) element.remove();
        });

        onChildChanged(messagesRef, (data) => {
            const msg = data.val();
            const element = document.getElementById(data.key);
            if (element) {
                element.querySelector('.msg-text').innerHTML = msg.text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
            }
        });
		// ... (коди пешинаи шумо: firebaseConfig, app, db ва ғайра)

// Эълони элементҳо
const input = document.getElementById("message-input");
const micBtn = document.getElementById("mic-btn"); // Ин ID-ро дар HTML илова кунед
const sendBtn = document.getElementById("send-btn"); // Ин ID-ро дар HTML илова кунед

// Функсияи нав барои идоракунии тугмаҳо
function updateButtons() {
    if (input.value.trim().length > 0 || document.activeElement === input) {
        micBtn.style.display = "none";
        sendBtn.style.display = "flex";
    } else {
        micBtn.style.display = "flex";
        sendBtn.style.display = "none";
    }
}

// Ҳодисаҳоро пайваст мекунем
input.addEventListener("input", updateButtons);
input.addEventListener("focus", updateButtons);
input.addEventListener("blur", updateButtons);

// ТАҒЙИРОТ ДАР sendMessage:
window.sendMessage = () => {
    const inputField = document.getElementById("message-input");
    if (inputField.value.trim() !== "") {
        const now = new Date();
        push(messagesRef, { 
            text: inputField.value, 
            senderId: myId, 
            time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            date: now.toLocaleDateString()
        });
        inputField.value = "";
        updateButtons(); // Барои баргардонидани тугмаи микрофон
    }
};

// ... (давоми коди шумо: onChildAdded, onChildRemoved ва ғайра)
// Тағйирёбанда барои назорат кардани ҳолати сабт
let isRecording = false;

// Ҳодиса барои тугмаи микрофон
micBtn.addEventListener("click", () => {
    isRecording = !isRecording; // Иваз кардани ҳолат (true <-> false)

    if (isRecording) {
        micBtn.classList.add("recording");
        console.log("Сабт оғоз шуд...");
        // Ин ҷо шумо метавонед коди Web Speech API-и худро барои оғози сабт илова кунед
    } else {
        micBtn.classList.remove("recording");
        console.log("Сабт қатъ шуд.");
        // Ин ҷо коди қатъ кардани сабтро илова кунед
    }
});
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #e5ddd5; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; position: relative; }
        .chat-box::after { content: ""; position: sticky; bottom: 0; left: 0; width: 100%; height: 30px; background: linear-gradient(to top, #e5ddd5, transparent); pointer-events: none; }
        
        .date-divider { align-self: center; background: #e1f3fb; color: #555; padding: 4px 12px; border-radius: 8px; font-size: 11px; margin: 10px 0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-bubble { position: relative; padding: 8px 10px 22px 10px; border-radius: 15px; max-width: 80%; width: fit-content; cursor: pointer; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .my-msg { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .rec-msg { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }
        .selected-message { background-color: #95c7f0 !important; }
        .msg-text { font-size: 15px; word-wrap: break-word; }
        .msg-time { position: absolute; bottom: 4px; right: 8px; font-size: 10px; color: #777; }
        
        #menu-trigger { visibility: hidden; cursor: pointer; font-size: 24px; padding: 0 5px; }
        #custom-menu { position: absolute; right: 20px; top: 60px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 9999; width: 180px; padding: 5px 0; opacity: 0; visibility: hidden; transition: 0.2s; }
        #custom-menu.show { opacity: 1; visibility: visible; }
        #custom-menu button { display: block; width: 100%; padding: 10px 15px; border: none; background: none; text-align: left; cursor: pointer; }
        
        .modal-overlay { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        
        .btn-action { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #075e54; color: white; }
        .btn-action:hover { opacity: 0.9; }

        .input-panel { padding: 10px; background: transparent; display: flex; gap: 8px; align-items: center; }
        textarea { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; height: 40px; resize: none; background: white; }
        .btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #075e54; color: white; cursor: pointer; }
		.input-panel {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 10px;
}

.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    background: #075e54;
    color: white;
    cursor: pointer;
    flex-shrink: 0; /* Барои он ки тугма хурд нашавад */
}
/* Аниматсияи тугмаи микрофон */
@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
    70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
}

/* Класс барои ҳолати сабт */
.recording {
    background-color: #ff4d4d !important; /* Ранги сурх */
    animation: pulse 1.5s infinite;      /* Аниматсия */
}
/* Нест кардани эффекти чоркунҷаи ҳангоми клик дар мобил */
button {
    -webkit-tap-highlight-color: transparent;
    -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
    outline: none;
}

/* Инчунин барои textarea ё дигар элементҳо, агар лозим шавад */
input, textarea, button {
    -webkit-tap-highlight-color: transparent;
}
    </style>
</head>
<body>
    <div id="custom-menu">
        <button onclick="copyMessage()">📋 Нусха кардан</button>
        <button onclick="openEditModal()">✏️ Таҳрир</button>
        <button onclick="showDeleteModal()">🗑️ Нест кардан</button>
        <button onclick="clearAllMessages()" style="color: red;">🧹 Пок кардани чат</button>
    </div>
    
    <div id="delete-modal" class="modal-overlay" onclick="if(event.target==this) closeModal('delete-modal')">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px;">Нест кардан:</h3>
            <button class="btn-action" onclick="deleteSelected('me')">👁️ Аз экрани ман</button>
            <button class="btn-action" onclick="deleteSelected('everyone')">🗑️ Аз ҳама</button>
        </div>
    </div>
    
    <div id="edit-modal" class="modal-overlay" onclick="if(event.target==this) closeModal('edit-modal')">
        <div class="modal-content">
            <textarea id="edit-input" style="width: 100%; height: 60px; margin-bottom:10px;"></textarea>
            <button class="btn-action" onclick="saveEdit()">Сабт кардан</button>
        </div>
    </div>
    
    <div class="header">
        <span></span> <div>TAJ CHAT</div> <span id="menu-trigger" onclick="openMenuAtTop(event)">⋮</span>
    </div>
    
  <div class="chat-box" id="chat-box"></div>

<div class="input-panel">
    <textarea id="message-input" placeholder="Паём..."></textarea>
    
    <button id="mic-btn" class="btn">
        <img src="https://cdn-icons-png.flaticon.com/128/3364/3364184.png" style="width: 20px; filter: brightness(0) invert(1);">
    </button>
    
    <button id="send-btn" class="btn" onclick="sendMessage()" style="display: none;">➤</button>
</div>
</body>
</html>
