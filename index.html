<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAJ CHAT</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        // Танзимоти Firebase-и шумо
        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        // Функция барои ирсоли паём ба Firebase
        window.sendMessage = () => {
            const input = document.getElementById("message-input");
            if (input.value.trim() !== "") {
                push(messagesRef, { text: input.value, sender: 'me' });
                input.value = "";
            }
        };

        // Гӯш кардани паёмҳои нав аз база
        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = msg.sender === 'me' ? 'my-message' : 'received-message';
            div.textContent = msg.text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
    <style>
        /* Услубҳои шумо */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; height: 100dvh; display: flex; flex-direction: column; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .my-message { align-self: flex-end; background: #007bff; color: white; padding: 10px; border-radius: 15px 15px 0 15px; max-width: 80%; }
        .received-message { align-self: flex-start; background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 15px 15px 15px 0; max-width: 80%; }
        .input-panel { padding: 10px; display: flex; gap: 8px; background: #fff; }
        textarea { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; }
        .btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #007bff; background: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-box" id="chat-box"></div>
    <div class="input-panel">
        <textarea id="message-input" placeholder="Паём..."></textarea>
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</body>
</html>
