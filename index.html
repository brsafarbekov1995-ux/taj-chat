<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJ CHAT</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myId = localStorage.getItem("chat_user_id") || "user_" + Math.floor(Math.random() * 1000000);
        localStorage.setItem("chat_user_id", myId);

        let lastDate = "";
        let selectedMessages = [];
        const menu = document.getElementById("custom-menu");
        const trigger = document.getElementById("menu-trigger");

        window.closeModal = (id) => { document.getElementById(id).style.display = "none"; };

        window.toggleSelect = (msgKey, element) => {
            if (selectedMessages.includes(msgKey)) {
                selectedMessages = selectedMessages.filter(id => id !== msgKey);
                element.classList.remove('selected-message');
            } else {
                selectedMessages.push(msgKey);
                element.classList.add('selected-message');
            }
            trigger.style.visibility = selectedMessages.length > 0 ? "visible" : "hidden";
        };

        window.openMenuAtTop = (e) => { e.stopPropagation(); menu.classList.toggle('show'); };

        document.addEventListener("click", (e) => {
            if (!e.target.closest('#custom-menu') && !e.target.closest('#menu-trigger')) {
                menu.classList.remove('show');
            }
        });

        window.copyMessage = () => {
            if (selectedMessages.length > 0) navigator.clipboard.writeText(document.getElementById(selectedMessages[0]).querySelector('.msg-text').innerText);
            menu.classList.remove('show');
        };

        window.openEditModal = () => {
            if (selectedMessages.length > 0) {
                document.getElementById("edit-input").value = document.getElementById(selectedMessages[0]).querySelector('.msg-text').innerText;
                document.getElementById("edit-modal").style.display = "flex";
            }
            menu.classList.remove('show');
        };

        window.saveEdit = () => {
            const newText = document.getElementById("edit-input").value;
            if (newText && selectedMessages.length > 0) update(ref(db, 'messages/' + selectedMessages[0]), { text: newText });
            closeModal('edit-modal');
        };

        window.showDeleteModal = () => { document.getElementById("delete-modal").style.display = "flex"; menu.classList.remove('show'); };

        window.clearAllMessages = () => {
            remove(messagesRef);
            document.getElementById("chat-box").innerHTML = "";
            lastDate = "";
            menu.classList.remove('show');
            trigger.style.visibility = "hidden";
        };

        window.deleteSelected = (type) => {
            selectedMessages.forEach(msgKey => {
                if (type === 'me') {
                    let hidden = JSON.parse(localStorage.getItem("hidden_msgs") || "[]");
                    hidden.push(msgKey);
                    localStorage.setItem("hidden_msgs", JSON.stringify(hidden));
                    document.getElementById(msgKey)?.remove();
                } else remove(ref(db, 'messages/' + msgKey));
            });
            selectedMessages = []; 
            trigger.style.visibility = "hidden";
            closeModal('delete-modal');
        };

        window.sendMessage = () => {
            const input = document.getElementById("message-input");
            if (input.value.trim() !== "") {
                const now = new Date();
                push(messagesRef, { 
                    text: input.value, 
                    senderId: myId, 
                    time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    date: now.toLocaleDateString()
                });
                input.value = "";
            }
        };

        onChildAdded(messagesRef, (data) => {
            let hidden = JSON.parse(localStorage.getItem("hidden_msgs") || "[]");
            if (hidden.includes(data.key)) return;
            
            const msg = data.val();
            const currentDate = msg.date || "Имрӯз";
            
            if (currentDate !== lastDate) {
                const dateDiv = document.createElement("div");
                dateDiv.className = "date-divider";
                dateDiv.innerText = currentDate;
                document.getElementById("chat-box").appendChild(dateDiv);
                lastDate = currentDate;
            }

            const div = document.createElement("div");
            div.id = data.key;
            div.className = `msg-bubble ${msg.senderId === myId ? 'my-msg' : 'rec-msg'}`;
            div.innerHTML = `<div class="msg-text">${msg.text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>')}</div><div class="msg-time">${msg.time}</div>`;
            div.onclick = () => window.toggleSelect(data.key, div);
            document.getElementById("chat-box").appendChild(div);
            document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
        });
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #e5ddd5; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        .date-divider { align-self: center; background: #e1f3fb; color: #555; padding: 4px 12px; border-radius: 8px; font-size: 11px; margin: 10px 0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-bubble { position: relative; padding: 8px 10px 22px 10px; border-radius: 8px; max-width: 80%; width: fit-content; cursor: pointer; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .my-msg { align-self: flex-end; background: #dcf8c6; }
        .rec-msg { align-self: flex-start; background: white; }
        .selected-message { background-color: #95c7f0 !important; border: 1px solid #34b7f1; }
        
        .msg-text { font-size: 15px; word-wrap: break-word; }
        .msg-time { position: absolute; bottom: 4px; right: 8px; font-size: 10px; color: #777; }
        
        #menu-trigger { visibility: hidden; cursor: pointer; font-size: 24px; padding: 0 5px; }
        #custom-menu { position: absolute; right: 20px; top: 60px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 9999; width: 180px; padding: 5px 0; opacity: 0; visibility: hidden; transition: 0.2s; }
        #custom-menu.show { opacity: 1; visibility: visible; }
        #custom-menu button { display: block; width: 100%; padding: 12px 15px; border: none; background: none; text-align: left; cursor: pointer; font-size: 14px; }
        #custom-menu button:hover { background: #f5f5f5; }

        .modal-overlay { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        /* Тугмаҳои зебо барои нест кардан */
        .modal-btn { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-me { background: #f0f2f5; color: #333; }
        .btn-me:active { background: #e0e0e0; transform: scale(0.97); }
        .btn-everyone { background: #ff3b30; color: white; }
        .btn-everyone:active { background: #d32f2f; transform: scale(0.97); }

        .input-panel { padding: 10px; background: #f0f0f0; display: flex; gap: 8px; align-items: center; }
        textarea { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; height: 40px; resize: none; }
        .btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #075e54; color: white; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div id="custom-menu">
        <button onclick="copyMessage()">📋 Нусха кардан</button>
        <button onclick="openEditModal()">✏️ Таҳрир</button>
        <button onclick="showDeleteModal()">🗑️ Нест кардан</button>
        <button onclick="clearAllMessages()" style="color: red;">🧹 Пок кардани чат</button>
    </div>

    <div id="delete-modal" class="modal-overlay" onclick="if(event.target==this) closeModal('delete-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 20px;">Нест кардани паём</h3>
            <button class="modal-btn btn-me" onclick="deleteSelected('me')">👁️ Танҳо аз худам</button>
            <button class="modal-btn btn-everyone" onclick="deleteSelected('everyone')">🗑️ Аз ҳама нест кардан</button>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay" onclick="if(event.target==this) closeModal('edit-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <textarea id="edit-input" style="width: 100%; height: 60px; margin-bottom: 15px; border-radius: 10px; padding: 10px; border: 1px solid #ccc;"></textarea>
            <button class="modal-btn btn-me" onclick="saveEdit()">Сабт кардан</button>
        </div>
    </div>
    
    <div class="header">
        <span></span> <div>TAJ CHAT</div> <span id="menu-trigger" onclick="openMenuAtTop(event)">⋮</span>
    </div>
    
    <div class="chat-box" id="chat-box"></div>
    <div class="input-panel">
        <textarea id="message-input" placeholder="Паём..."></textarea>
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</body>
</html>
